name: JSON Output Schema Check

on:
  pull_request:
    paths:
      - docs/json-output-schema-v1.schema.json
      - docs/fixtures/json-output/**
      - docs/json-output-schema-v1.md
      - scripts/validate_json_output_schema.py
      - .github/workflows/json-output-schema-check.yml
  push:
    branches:
      - main
    paths:
      - docs/json-output-schema-v1.schema.json
      - docs/fixtures/json-output/**
      - docs/json-output-schema-v1.md
      - scripts/validate_json_output_schema.py
      - .github/workflows/json-output-schema-check.yml

jobs:
  validate-schema-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip jsonschema

      - name: Validate fixtures
        run: python scripts/validate_json_output_schema.py
