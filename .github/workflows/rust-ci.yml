name: Rust CI

on:
  pull_request:
    paths:
      - Cargo.toml
      - rust-toolchain.toml
      - crates/**
      - tests/compat/stylelint/**
      - docs/json-output-schema-v1.schema.json
      - docs/json-output-schema-v1.md
      - docs/fixtures/json-output/**
      - scripts/validate_json_output_schema.py
      - scripts/import_stylelint_fixtures.mjs
      - scripts/validate_stylelint_skip_manifest.py
      - scripts/check_internal_deps.py
      - .github/workflows/rust-ci.yml
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - rust-toolchain.toml
      - crates/**
      - tests/compat/stylelint/**
      - docs/json-output-schema-v1.schema.json
      - docs/json-output-schema-v1.md
      - docs/fixtures/json-output/**
      - scripts/validate_json_output_schema.py
      - scripts/import_stylelint_fixtures.mjs
      - scripts/validate_stylelint_skip_manifest.py
      - scripts/check_internal_deps.py
      - .github/workflows/rust-ci.yml
  schedule:
    - cron: "0 6 * * *"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Cargo check workspace
        run: cargo check --workspace

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: rustfmt, clippy

      - name: Cargo fmt check
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Enforce internal dependency policy
        run: python3 scripts/check_internal_deps.py

  unit:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Run unit tests
        run: cargo test --workspace --lib

  integration:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Run integration smoke suite
        run: cargo test -p csslint-test-harness --test smoke_pipeline

  compat-fast:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Verify imported compatibility fixtures are deterministic
        run: node scripts/import_stylelint_fixtures.mjs --check

      - name: Validate skip manifest governance
        run: python3 scripts/validate_stylelint_skip_manifest.py

      - name: Generate compat-fast curated summary
        run: cargo run -p csslint-test-harness --bin stylelint_compat_report -- --mode fast --output artifacts/compat/compat-fast-summary.json

      - name: Upload compat-fast artifact
        uses: actions/upload-artifact@v4
        with:
          name: compat-fast-summary
          path: artifacts/compat/compat-fast-summary.json

  compat-full:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Verify imported compatibility fixtures are deterministic
        run: node scripts/import_stylelint_fixtures.mjs --check

      - name: Validate skip manifest governance
        run: python3 scripts/validate_stylelint_skip_manifest.py

      - name: Generate compat-full imported summary with ratchet check
        run: cargo run -p csslint-test-harness --bin stylelint_compat_report -- --mode full --output artifacts/compat/compat-summary.json --baseline tests/compat/stylelint/baseline/compat-summary.json --enforce-ratchet

      - name: Upload compat-full artifact
        uses: actions/upload-artifact@v4
        with:
          name: compat-summary
          path: artifacts/compat/compat-summary.json

  json-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install schema validator dependency
        run: python -m pip install --upgrade pip jsonschema

      - name: Validate JSON output schema fixtures
        run: python scripts/validate_json_output_schema.py

  perf:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Run perf smoke suite
        run: cargo test -p csslint-test-harness --test perf_smoke
