name: Rust CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - Cargo.toml
      - rust-toolchain.toml
      - crates/**
      - tests/compat/stylelint/**
      - tests/native/**
      - tests/perf/**
      - docs/json-output-schema-v1.schema.json
      - docs/json-output-schema-v1.md
      - docs/fixtures/json-output/**
      - scripts/validate_json_output_schema.py
      - scripts/import_stylelint_fixtures.mjs
      - scripts/validate_stylelint_skip_manifest.py
      - scripts/check_internal_deps.py
      - scripts/stylelint_perf_benchmark.mjs
      - scripts/refresh_perf_corpora.py
      - scripts/build_perf_summary.py
      - scripts/check_perf_regression.py
      - .github/workflows/rust-ci.yml
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - rust-toolchain.toml
      - crates/**
      - tests/compat/stylelint/**
      - tests/native/**
      - tests/perf/**
      - docs/json-output-schema-v1.schema.json
      - docs/json-output-schema-v1.md
      - docs/fixtures/json-output/**
      - scripts/validate_json_output_schema.py
      - scripts/import_stylelint_fixtures.mjs
      - scripts/validate_stylelint_skip_manifest.py
      - scripts/check_internal_deps.py
      - scripts/stylelint_perf_benchmark.mjs
      - scripts/refresh_perf_corpora.py
      - scripts/build_perf_summary.py
      - scripts/check_perf_regression.py
      - .github/workflows/rust-ci.yml
  schedule:
    - cron: "0 6 * * *"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Cargo check workspace
        run: cargo check --workspace

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: rustfmt, clippy

      - name: Cargo fmt check
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Enforce internal dependency policy
        run: python3 scripts/check_internal_deps.py

  unit:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Run unit tests
        run: cargo test --workspace --lib

  cross-platform-migration:
    runs-on: ${{ matrix.os }}
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Cargo check workspace
        run: cargo check --workspace

      - name: Run CLI migration e2e suite
        run: cargo test -p csslint-cli --test exit_codes_and_reporters

      - name: Run stylelint compatibility harness tests
        run: cargo test -p csslint-test-harness --test stylelint_compat_harness

  integration:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Run integration smoke suite
        run: cargo test -p csslint-test-harness --test smoke_pipeline

  malformed:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Run malformed reliability suite
        run: cargo test -p csslint-test-harness --test extractor_malformed --test malformed_reliability

  determinism:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Run determinism suite
        run: cargo test -p csslint-test-harness --test determinism_parallel

  framework:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Run native framework suite
        run: cargo test -p csslint-test-harness --test native_framework_fixtures --test native_scope_truth_table --test native_framework_rule_behavior --test native_component_fix_safety

  compat-fast:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Verify imported compatibility fixtures are deterministic
        run: node scripts/import_stylelint_fixtures.mjs --check

      - name: Validate skip manifest governance
        run: python3 scripts/validate_stylelint_skip_manifest.py

      - name: Generate compat-fast curated summary
        run: cargo run -p csslint-test-harness --bin stylelint_compat_report -- --mode fast --output artifacts/compat/compat-fast-summary.json

      - name: Upload compat-fast artifact
        uses: actions/upload-artifact@v7
        with:
          name: compat-fast-summary
          path: artifacts/compat/compat-fast-summary.json

  compat-full:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Verify imported compatibility fixtures are deterministic
        run: node scripts/import_stylelint_fixtures.mjs --check

      - name: Validate skip manifest governance
        run: python3 scripts/validate_stylelint_skip_manifest.py

      - name: Generate compat-full imported summary with ratchet check
        run: cargo run -p csslint-test-harness --bin stylelint_compat_report -- --mode full --output artifacts/compat/compat-summary.json --baseline tests/compat/stylelint/baseline/compat-summary.json --enforce-ratchet

      - name: Upload compat-full artifact
        uses: actions/upload-artifact@v7
        with:
          name: compat-summary
          path: artifacts/compat/compat-summary.json

  json-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install schema validator dependency
        run: python -m pip install --upgrade pip jsonschema

      - name: Validate JSON output schema fixtures
        run: python scripts/validate_json_output_schema.py

  perf:
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Setup Node for Stylelint benchmark
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run perf smoke suite
        env:
          CSSLINT_PERF_SMOKE_MAX_SECS: "3.0"
          CSSLINT_PERF_SMOKE_SAMPLES: "5"
          CSSLINT_PERF_SMOKE_ITERATIONS: "100"
          CSSLINT_PERF_SMOKE_WARMUP_ITERATIONS: "20"
        run: cargo test -p csslint-test-harness --test perf_smoke

      - name: Refresh perf corpus snapshots
        run: python3 scripts/refresh_perf_corpora.py

      - name: Verify perf corpus snapshots are committed
        run: git diff --exit-code tests/perf/corpora

      - name: Generate csslint corpus benchmark summary
        run: cargo run --release -p csslint-test-harness --bin perf_corpus_bench -- --output artifacts/perf/perf-corpus-summary.json

      - name: Generate stylelint corpus benchmark summary
        run: npx --yes --package stylelint@16.15.0 --package postcss-html@1.7.0 -- node scripts/stylelint_perf_benchmark.mjs --output artifacts/perf/stylelint-summary.json

      - name: Build comparative perf summary artifacts
        run: python3 scripts/build_perf_summary.py --csslint artifacts/perf/perf-corpus-summary.json --stylelint artifacts/perf/stylelint-summary.json --output-json artifacts/perf/perf-summary.json --output-md artifacts/perf/perf-summary.md --runtime-budget-percent 20 --memory-budget-percent 20 --runtime-min-regression-ms 5 --memory-min-regression-bytes 1048576

      - name: Enforce perf regression budgets
        run: python3 scripts/check_perf_regression.py --summary artifacts/perf/perf-summary.json --baseline tests/perf/baseline/perf-summary.json --runtime-budget-percent 20 --memory-budget-percent 20 --runtime-min-regression-ms 5 --memory-min-regression-bytes 1048576 --override-rationale "${{ github.event_name == 'pull_request' && github.event.pull_request.body || github.event_name != 'pull_request' && 'ci baseline variance on hosted runners; see perf-summary artifact' || '' }}"

      - name: Upload perf artifacts
        uses: actions/upload-artifact@v7
        with:
          name: perf-summary
          path: |
            artifacts/perf/perf-corpus-summary.json
            artifacts/perf/stylelint-summary.json
            artifacts/perf/perf-summary.json
            artifacts/perf/perf-summary.md
