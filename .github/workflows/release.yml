name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: csslint-linux-x86_64
            archive_name: csslint-linux-x86_64.tar.gz
            binary_path: target/release/csslint
          - os: macos-latest
            artifact_name: csslint-macos-x86_64
            archive_name: csslint-macos-x86_64.tar.gz
            binary_path: target/release/csslint
          - os: windows-latest
            artifact_name: csslint-windows-x86_64
            archive_name: csslint-windows-x86_64.zip
            binary_path: target/release/csslint.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0

      - name: Build release binary
        run: cargo build --release -p csslint-cli

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" dist/csslint
          tar -czf "${{ matrix.archive_name }}" -C dist csslint

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "dist/csslint.exe"
          Compress-Archive -Path "dist/csslint.exe" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Compute checksum (Unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 "${{ matrix.archive_name }}" > "${{ matrix.archive_name }}.sha256"

      - name: Compute checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.archive_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive_name }}" | Out-File -Encoding ascii "${{ matrix.archive_name }}.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Gather release files
        run: |
          mkdir -p release-assets
          find dist -type f -exec cp {} release-assets/ \;

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
